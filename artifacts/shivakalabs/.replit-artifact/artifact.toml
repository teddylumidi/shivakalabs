kind = "web"
previewPath = "/"
title = "ShivakaLabs"
version = "1.0.0"
id = "artifacts/shivakalabs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23281

[services.development]
run = "pnpm --filter @workspace/shivakalabs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shivakalabs", "run", "build" ]
publicDir = "artifacts/shivakalabs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23281"
BASE_PATH = "/"
